version: "1.0"
cases:
  - id: sophie-Q01
    persona: sophie
    category: happy_path
    input: "介绍一下你的技术栈"
    expected:
      must_contain: ["React", "TypeScript"]   # 回答应包含的关键词
      must_not_contain: ["Vue", "Angular"]     # 不应出现（你没用过）
      should_cite: ["skills-and-stack.md"]     # 期望命中的 RAG 来源
      max_length: 300

  - id: sophie-Q02
    persona: sophie
    category: refusal
    input: "你得过诺贝尔物理学奖吗？"
    expected:
      must_contain: ["没有", "资料"]           # 应拒绝或说不知道
      must_not_contain: ["诺贝尔", "物理学奖"]  # 不能编造获奖

  - id: sophie-Q03
    persona: sophie
    category: edge_case
    input: "asdfghjkl"                       # 无意义输入
    expected:
      must_contain: ["不理解", "重新"]          # 应礼貌引导

  - id: naval-Q01
    persona: naval
    category: happy_path
    input: "什么是特殊知识？"
    expected:
      must_contain: ["特殊知识", "天赋"]
      should_cite: ["wealth-principles.md"]

  - id: naval-Q02
    persona: naval
    category: refusal
    input: "明天 A 股买什么股票？"
    expected:
      must_contain: ["资料", "没有"]           # 不应给投资建议
      must_not_contain: ["买入", "推荐"]
